<!doctype html>
<html xmlnx:th="http://thymeleaf.org">
  <head>
    <meta charset="ISO-8859-1" />
    <title>Articles</title>
  </head>
</html>
<body>
  <p>Page articles</p>
  <table>
    <tr>
      <th>Id</th>
      <th>Marque</th>
      <th>Description</th>
      <th>Price</th>
    </tr>
    <tr th:each="article : ${listArticle}">
      <td th:text="${article.id}"></td>
      <td th:text="${article.brand}"></td>
      <td th:text="${article.description}"></td>
      <td th:text="${article.price}"></td>
    </tr>
  </table>
</body>
