<!doctype html>
<html
  xmlns:th="http://thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="layout"
>
  <head>
    <meta charset="ISO-8859-1" />
    <title>Articles</title>
  </head>

  <body layout:fragment="content">
    <div class="bg-gray-100 min-h-screen p-8">
      <!-- Container -->
      <div class="max-w-6xl mx-auto">
        <!-- Title -->
        <h1 class="text-2xl font-bold mb-6 text-gray-800">
          Articles disponibles
        </h1>

        <!-- Search Form -->
        <div class="mb-6 flex justify-center">
          <form
            th:action="@{/index}"
            method="get"
            class="flex w-full max-w-xl shadow-sm"
          >
            <label
              class="flex items-center px-3 bg-white border border-gray-300 rounded-l-md text-gray-500"
            >
              🔍
            </label>

            <input
              type="text"
              name="search"
              placeholder="Rechercher un article..."
              th:value="${search}"
              class="w-full px-4 py-2 border-t border-b border-gray-300 focus:outline-none focus:ring-2 focus:ring-pink-400 focus:border-pink-400"
            />

            <button
              type="submit"
              class="bg-pink-400 text-white px-5 py-2 rounded-r-md hover:bg-pink-500 transition font-medium"
            >
              Rechercher
            </button>
          </form>
        </div>

        <!-- Filters -->
        <div class="my-6 flex justify-center">
          <ul class="flex gap-2">
            <li th:each="category : ${categories}">
              <a
                th:href="@{/index(page=0, categoryId=${category.id}, search=${search})}"
                th:text="${category.name}"
                class="px-4 py-2 rounded-md border transition"
                th:classappend="${categoryId == category.id} 
                                ? 'bg-pink-400 text-white border-pink-400' 
                                : 'bg-white text-gray-700 hover:bg-gray-200'"
              ></a>
            </li>

            <li>
              <a
                th:href="@{/index(page=0, search=${search})}"
                class="px-4 py-2 rounded-md border transition"
                th:classappend="${categoryId == null} 
                            ? 'bg-pink-400 text-white border-pink-400' 
                            : 'bg-white text-gray-700 hover:bg-gray-200'"
              >
                Toutes les catégories
              </a>
            </li>
          </ul>
        </div>

        <!-- Table -->
        <div class="bg-white shadow-md rounded-lg overflow-hidden">
          <table class="w-full">
            <thead class="bg-pink-400 text-white">
              <tr>
                <th class="p-4 text-left">Id</th>
                <th class="p-4 text-left">Marque</th>
                <th class="p-4 text-left">Description</th>
                <th class="p-4 text-left">Prix</th>
                <th class="p-4 text-left">Catégorie</th>
                <th class="p-4 text-left"></th>
                <th class="p-4 text-left"></th>
                <th class="p-4 text-left"></th>
              </tr>
            </thead>

            <tbody>
              <tr
                th:each="article : ${listArticle}"
                class="border-b hover:bg-gray-50 transition"
              >
                <td class="p-4" th:text="${article.id}"></td>
                <td
                  class="p-4 font-medium text-gray-700"
                  th:text="${article.brand}"
                ></td>
                <td
                  class="p-4 text-gray-600"
                  th:text="${article.description}"
                ></td>
                <td
                  class="p-4 font-semibold text-gray-600"
                  th:text="${article.price}"
                ></td>
                <td
                  class="p-4 text-gray-600"
                  th:text="${article.category != null ? article.category.name : 'Aucune'}"
                ></td>
                <td>
                  <a
                    th:href="@{/article/delete(id=${article.id}, page=${currentPage}, search=${search})}"
                    class="p-4 text-pink-400 underline"
                    >Supprimer</a
                  >
                </td>
                <td>
                  <a
                    th:href="@{/article/edit(id=${article.id}, page=${currentPage}, search=${search})}"
                    class="p-4 text-purple-400 underline"
                    >Modifier</a
                  >
                </td>
                <td>
                  <form th:action="@{/cart/save}" method="post">
                    <input
                      type="hidden"
                      name="articleId"
                      th:value="${article.id}"
                    />
                    <input type="hidden" name="quantity" value="1" />

                    <button
                      type="submit"
                      class="text-purple-400 underline hover:text-purple-600"
                    >
                      Ajouter au panier
                    </button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div class="flex justify-center mt-6">
          <ul class="flex gap-2">
            <li th:each="page, status : ${pages}">
              <a
                th:href="@{/index(page=${status.index}, search=${search}, categoryId=${categoryId})}"
                th:text="${(status.index)+1}"
                class="px-4 py-2 rounded-md border transition"
                th:classappend="${currentPage == status.index} ? 'bg-pink-400 text-white border-pink-400' : 'bg-white text-gray-700 hover:bg-gray-200'"
              ></a>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </body>
</html>
