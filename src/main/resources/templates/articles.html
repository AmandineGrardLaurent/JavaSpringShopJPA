<!doctype html>
<html xmlns:th="http://thymeleaf.org">
  <head>
    <meta charset="ISO-8859-1" />
    <title>Articles</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100 min-h-screen p-8">
    <!-- Container -->
    <div class="max-w-6xl mx-auto">
      <!-- Title -->
      <h1 class="text-2xl font-bold mb-6 text-gray-800">
        Page des articles disponibles
      </h1>

      <!-- Table -->
      <div class="bg-white shadow-md rounded-lg overflow-hidden">
        <table class="w-full">
          <thead class="bg-gray-800 text-white">
            <tr>
              <th class="p-4 text-left">Id</th>
              <th class="p-4 text-left">Marque</th>
              <th class="p-4 text-left">Description</th>
              <th class="p-4 text-left">Prix</th>
            </tr>
          </thead>

          <tbody>
            <tr
              th:each="article : ${listArticle}"
              class="border-b hover:bg-gray-50 transition"
            >
              <td class="p-4" th:text="${article.id}"></td>
              <td
                class="p-4 font-medium text-gray-700"
                th:text="${article.brand}"
              ></td>
              <td
                class="p-4 text-gray-600"
                th:text="${article.description}"
              ></td>
              <td
                class="p-4 font-semibold text-green-600"
                th:text="${article.price}"
              ></td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="flex justify-center mt-6">
        <ul class="flex gap-2">
          <li th:each="page, status : ${pages}">
            <a
              th:href="@{/index(page=${status.index})}"
              th:text="${status.index}"
              class="px-4 py-2 rounded-md border transition"
              th:classappend="${currentPage == status.index} ? 'bg-pink-400 text-white border-pink-400' : 'bg-white text-gray-700 hover:bg-gray-200'"
            ></a>
          </li>
        </ul>
      </div>
    </div>
  </body>
</html>
