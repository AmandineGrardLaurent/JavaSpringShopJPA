<!doctype html>
<html xmlns:th="http://thymeleaf.org">
  <head>
    <meta charset="ISO-8859-1" />
    <title>Articles</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="p-6 bg-gray-100">
    <p class="text-xl font-bold mb-4">Page des articles disponibles</p>

    <table class="w-full bg-white shadow-md rounded-lg overflow-hidden">
      <thead class="bg-gray-800 text-white">
        <tr>
          <th class="p-3 text-left">Id</th>
          <th class="p-3 text-left">Marque</th>
          <th class="p-3 text-left">Description</th>
          <th class="p-3 text-left">Prix</th>
        </tr>
      </thead>

      <tbody>
        <tr
          th:each="article : ${listArticle}"
          class="border-b hover:bg-gray-50"
        >
          <td class="p-3" th:text="${article.id}"></td>
          <td class="p-3" th:text="${article.brand}"></td>
          <td class="p-3" th:text="${article.description}"></td>
          <td class="p-3" th:text="${article.price}"></td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
