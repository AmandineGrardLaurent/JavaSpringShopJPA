<!doctype html>
<html
  xmlns:th="http://thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="layout"
>
  <head>
    <meta charset="ISO-8859-1" />
    <title>Ajout d'un article</title>
  </head>

  <body layout:fragment="content">
    <div class="bg-gray-100 min-h-screen flex items-center justify-center p-6">
      <div class="w-full max-w-lg bg-white rounded-xl shadow-md p-8">
        <!-- Title -->
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">
          Ajouter un article
        </h1>

        <!-- Formulaire de création d'un nouvel article -->
        <form
          th:action="@{/article/save}"
          method="post"
          th:object="${article}"
          class="space-y-5"
        >
          <!-- Brand -->
          <div>
            <label
              for="brand"
              class="block text-sm font-medium text-gray-700 mb-1"
            >
              Marque
            </label>
            <input
              id="brand"
              type="text"
              th:field="*{brand}"
              placeholder="Samsung, Apple..."
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-400 focus:border-pink-400 transition"
            />
            <span th:errors="${article.brand}"></span>
          </div>

          <!-- Description -->
          <div>
            <label
              for="description"
              class="block text-sm font-medium text-gray-700 mb-1"
            >
              Description
            </label>
            <input
              id="description"
              type="text"
              th:field="*{description}"
              placeholder="iPhone 7, Galaxy S21..."
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-400 focus:border-pink-400 transition"
            />
            <span th:errors="${article.description}"></span>
          </div>

          <!-- Price -->
          <div>
            <label
              for="price"
              class="block text-sm font-medium text-gray-700 mb-1"
            >
              Prix (€)
            </label>
            <input
              id="price"
              type="number"
              step="0.01"
              th:field="*{price}"
              placeholder="399.99"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-400 focus:border-pink-400 transition"
            />
            <span th:errors="${article.price}"></span>
          </div>

          <!-- Category -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Catégorie
            </label>

            <div class="space-y-2">
              <div
                th:each="category : ${categories}"
                class="flex items-center gap-2"
              >
                <input
                  type="radio"
                  th:field="*{category.id}"
                  th:value="${category.id}"
                  class="accent-pink-400"
                />

                <label th:text="${category.name}" class="text-gray-700"></label>
              </div>
            </div>
          </div>

          <!-- Button -->
          <button
            type="submit"
            class="w-full bg-pink-400 text-white py-2.5 rounded-lg hover:bg-pink-500 transition font-semibold shadow-sm"
          >
            Enregistrer
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
