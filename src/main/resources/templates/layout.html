<!doctype html>
<html
  xmlns:th="http://thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
>
  <head>
    <meta charset="ISO-8859-1" />
    <title>Layout</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100 min-h-screen">
    <!-- navbar -->
    <nav class="bg-white shadow-md">
      <div
        class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center"
      >
        <!-- Logo -->
        <div class="text-xl font-bold text-gray-800">🛒 SpringShop</div>

        <!-- Links -->
        <ul class="flex gap-6 text-gray-600 font-medium">
          <li>
            <a th:href="@{/index}" class="hover:text-pink-500 transition">
              Articles
            </a>
          </li>

          <li>
            <a href="#" class="hover:text-pink-500 transition"> 2 </a>
          </li>

          <li>
            <a href="#" class="hover:text-pink-500 transition"> 3 </a>
          </li>
        </ul>
      </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6">
      <section layout:fragment="content"></section>
    </main>
  </body>
</html>
